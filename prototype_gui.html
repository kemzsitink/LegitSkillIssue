<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegitSkillIssue GUI - Tailwind Edition</title>

    <!-- Lấy Font Inter nét mỏng (Light 300) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Tích hợp Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        accent: '#4FACEE',
                        'accent-glow': 'rgba(79, 172, 238, 0.4)',
                        panel: 'rgba(20, 20, 25, 0.45)',
                        'panel-border': 'rgba(255, 255, 255, 0.08)',
                        dim: '#a0a0a5',
                    }
                }
            }
        }
    </script>

    <style>
        /* CSS thuần cho các hiệu ứng phức tạp mà Tailwind khó xử lý (Pseudo, Scrollbar, Animation) */

        body { background-image: url('https://pica.zhimg.com/v2-927976e57065961a84f33192070c7931_r.jpg'); background-size: cover; background-position: center; }

        /* Lớp phủ Grid & Liquid */
        .ui-overlay { background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px); background-size: 30px 30px; }

        .liquid-blob {
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 60%);
            filter: blur(60px); animation: float 10s infinite alternate ease-in-out;
        }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(150px, 80px) scale(1.2); } }

        /* Thanh cuộn Custom */
        .panel-content::-webkit-scrollbar { width: 3px; }
        .panel-content::-webkit-scrollbar-thumb { background: #4FACEE; border-radius: 4px; }

        /* Animation Mở/Đóng Panel Chính */
        .panel-content { transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s; max-height: 70vh; opacity: 1; }
        .panel.collapsed .panel-content { max-height: 0; opacity: 0; pointer-events: none; }
        .panel.collapsed .panel-arrow { transform: rotate(-90deg); } /* Mũi tên tiêu đề xoay khi đóng */

        /* CSS cho Module (Dấu gạch dọc khi Active) */
        .module.active .module-header { background: rgba(79, 172, 238, 0.15); color: white; }
        .module.active .module-header::before {
            content: ''; position: absolute; left: 4px; top: 50%; transform: translateY(-50%);
            height: 60%; width: 3px; background: #4FACEE; border-radius: 4px; box-shadow: 0 0 8px #4FACEE;
        }

        /* Nhánh Cài đặt (Settings Branch) */
        .settings-branch { transition: max-height 0.4s ease, opacity 0.3s ease, padding 0.3s ease; max-height: 0; opacity: 0; }
        .module.expanded .settings-branch { max-height: 300px; opacity: 1; padding-top: 0.5rem; padding-bottom: 0.5rem; }

        /* Hiệu ứng xoay dấu + thành dấu x khi mở Settings */
        .module.expanded .indicator { transform: rotate(45deg); color: white; }

        .settings-branch::before { content: ''; position: absolute; left: 16px; top: 0; bottom: 12px; width: 1px; background: rgba(255,255,255,0.15); }
        .setting-item::before { content: ''; position: absolute; left: -10px; top: 15px; width: 8px; height: 1px; background: rgba(255,255,255,0.15); }

        /* UI Components Tự tạo */
        .toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 10px; height: 10px; background: white; border-radius: 50%; transition: 0.3s; box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .toggle-switch.on { background: #4FACEE; box-shadow: 0 0 8px rgba(79, 172, 238, 0.4); }
        .toggle-switch.on::after { left: calc(100% - 12px); }

        .slider-fill { pointer-events: none; }
        .slider-handle { pointer-events: none; transition: transform 0.2s; }
        .slider-container:hover .slider-handle { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 10px rgba(79, 172, 238, 0.6); }
    </style>
</head>
<body class="m-0 overflow-hidden h-screen bg-[#0f0f13] text-white font-light select-none">

    <!-- Lớp phủ (Background Effects) -->
    <div class="ui-overlay absolute inset-0 pointer-events-none z-0"></div>
    <div class="liquid-blob absolute w-[600px] h-[600px] rounded-full top-[20%] left-[30%] opacity-50 pointer-events-none z-0"></div>

    <div class="relative w-full h-screen z-10">

        <!-- ================= PANEL 1: COMBAT ================= -->
        <div class="panel absolute w-[230px] flex flex-col bg-panel backdrop-blur-md border border-panel-border rounded-xl shadow-[0_12px_32px_rgba(0,0,0,0.5)] transition-all duration-200" style="top: 80px; left: 50px;">
            <!-- Panel Header -->
            <div class="panel-header flex justify-between items-center p-3.5 bg-black/40 border-b border-panel-border rounded-t-xl cursor-move text-sm font-medium">
                <span>Combat</span>
                <span class="panel-arrow text-[10px] text-dim transition-transform duration-300">▼</span>
            </div>

            <!-- Panel Content -->
            <div class="panel-content overflow-y-auto overflow-x-hidden">
                <div class="module-list py-2">

                    <div class="module active expanded mx-2 my-0.5 rounded-md transition-all duration-300">
                        <div class="module-header flex justify-between items-center p-2.5 rounded-md relative bg-transparent hover:bg-white/5 cursor-pointer text-[13px]" onmousedown="handleModuleClick(event, this)">
                            <div class="flex items-center gap-2">
                                <span class="ml-2">Reach</span>
                                <span class="text-[10px] text-dim bg-white/10 px-1.5 py-0.5 rounded">R</span>
                            </div>
                            <!-- Dấu cộng (+) -->
                            <span class="indicator text-[18px] leading-none text-dim transition-transform duration-300">+</span>
                        </div>
                        <div class="settings-branch relative pl-[26px] pr-3 overflow-hidden" onclick="event.stopPropagation()">
                            <div class="setting-item relative flex flex-col gap-1.5 py-1.5 text-xs text-dim">
                                <div class="flex justify-between items-center">
                                    Range <span class="text-white bg-black/40 px-1.5 border border-white/5 rounded">3.2</span>
                                </div>
                                <div class="slider-container w-full py-1 cursor-pointer relative">
                                    <div class="h-1 bg-white/10 w-full rounded relative">
                                        <div class="slider-fill h-full bg-accent rounded shadow-[0_0_6px_var(--accent-glow)]" style="width: 35%;"></div>
                                        <div class="slider-handle absolute top-1/2 left-[35%] w-3 h-3 bg-white rounded-full shadow-md -translate-x-1/2 -translate-y-1/2"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="module active mx-2 my-0.5 rounded-md transition-all duration-300">
                        <div class="module-header flex justify-between items-center p-2.5 rounded-md relative bg-transparent hover:bg-white/5 cursor-pointer text-[13px]" onmousedown="handleModuleClick(event, this)">
                            <div class="flex items-center gap-2"><span class="ml-2">AutoClicker</span></div>
                            <!-- Dấu cộng (+) -->
                            <span class="indicator text-[18px] leading-none text-dim transition-transform duration-300">+</span>
                        </div>
                        <div class="settings-branch relative pl-[26px] pr-3 overflow-hidden" onclick="event.stopPropagation()">
                            <div class="setting-item relative flex flex-col gap-1.5 py-1.5 text-xs text-dim">
                                <div class="flex justify-between items-center">Mode
                                    <div class="bg-black/40 px-2 py-1 rounded-md flex items-center gap-1.5 border border-white/5 hover:bg-white/10 cursor-pointer text-white">Normal <span class="text-[8px] text-dim">▼</span></div>
                                </div>
                            </div>
                            <div class="setting-item relative flex flex-col gap-1.5 py-1.5 text-xs text-dim">
                                <div class="flex justify-between items-center">Jitter
                                    <div class="toggle-switch on w-7 h-3.5 bg-white/15 rounded-full relative cursor-pointer" onclick="this.classList.toggle('on')"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="module mx-2 my-0.5 rounded-md transition-all duration-300">
                        <div class="module-header flex justify-between items-center p-2.5 rounded-md relative bg-transparent hover:bg-white/5 cursor-pointer text-[13px]" onmousedown="handleModuleClick(event, this)">
                            <div class="flex items-center gap-2"><span class="ml-2">Velocity</span></div>
                            <!-- Dấu cộng (+) -->
                            <span class="indicator text-[18px] leading-none text-dim transition-transform duration-300">+</span>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- ================= PANEL 2: MOVEMENT ================= -->
        <div class="panel absolute w-[230px] flex flex-col bg-panel backdrop-blur-md border border-panel-border rounded-xl shadow-[0_12px_32px_rgba(0,0,0,0.5)] transition-all duration-200" style="top: 80px; left: 300px;">
            <div class="panel-header flex justify-between items-center p-3.5 bg-black/40 border-b border-panel-border rounded-t-xl cursor-move text-sm font-medium">
                <span>Movement</span>
                <span class="panel-arrow text-[10px] text-dim transition-transform duration-300">▼</span>
            </div>
            <div class="panel-content overflow-y-auto overflow-x-hidden">
                <div class="module-list py-2">
                    <div class="module active mx-2 my-0.5 rounded-md transition-all duration-300">
                        <div class="module-header flex justify-between items-center p-2.5 rounded-md relative bg-transparent hover:bg-white/5 cursor-pointer text-[13px]" onmousedown="handleModuleClick(event, this)">
                            <div class="flex items-center gap-2">
                                <span class="ml-2">Speed</span>
                                <span class="text-[10px] text-dim bg-white/10 px-1.5 py-0.5 rounded">V</span>
                            </div>
                            <!-- Dấu cộng (+) -->
                            <span class="indicator text-[18px] leading-none text-dim transition-transform duration-300">+</span>
                        </div>
                        <div class="settings-branch relative pl-[26px] pr-3 overflow-hidden" onclick="event.stopPropagation()">
                            <div class="setting-item relative flex flex-col gap-1.5 py-1.5 text-xs text-dim">
                                <div class="flex justify-between items-center">Mode
                                    <div class="bg-black/40 px-2 py-1 rounded-md flex items-center gap-1.5 border border-white/5 hover:bg-white/10 cursor-pointer text-white">Bhop <span class="text-[8px] text-dim">▼</span></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="module mx-2 my-0.5 rounded-md transition-all duration-300">
                        <div class="module-header flex justify-between items-center p-2.5 rounded-md relative bg-transparent hover:bg-white/5 cursor-pointer text-[13px]" onmousedown="handleModuleClick(event, this)">
                            <div class="flex items-center gap-2"><span class="ml-2">Flight</span><span class="text-[10px] text-dim bg-white/10 px-1.5 py-0.5 rounded">F</span></div>
                            <!-- Dấu cộng (+) -->
                            <span class="indicator text-[18px] leading-none text-dim transition-transform duration-300">+</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Watermark (Chữ ký) -->
    <div class="absolute bottom-5 right-5 text-white/30 text-xs font-medium tracking-wide z-10">
        LegitSkillIssue 4.1 // Tailwind UI
    </div>

    <script>
        // --- NGĂN CHẶN MENU CHUỘT PHẢI MẶC ĐỊNH ---
        document.addEventListener('contextmenu', event => event.preventDefault());

        // --- 1. XỬ LÝ CLICK MODULE ---
        function handleModuleClick(event, element) {
            let moduleDiv = element.parentElement;

            if (event.button === 0) {
                // Chuột trái: Bật / Tắt (Active)
                moduleDiv.classList.toggle('active');
            }
            else if (event.button === 2) {
                // Chuột phải: Mở / Đóng nhánh settings
                if (moduleDiv.querySelector('.settings-branch')) {
                    moduleDiv.classList.toggle('expanded');
                }
            }
        }

        // --- 2. HỆ THỐNG DRAG & DROP VÀ ĐÓNG MỞ PANEL ---
        const panels = document.querySelectorAll('.panel');
        let activePanel = null;
        let startX, startY, initialX, initialY;

        panels.forEach(panel => {
            const header = panel.querySelector('.panel-header');

            panel.addEventListener('mousedown', () => {
                panels.forEach(p => p.style.zIndex = 1);
                panel.style.zIndex = 10;
            });

            header.addEventListener('mousedown', (e) => {
                if (e.button === 0) {
                    activePanel = panel;
                    startX = e.clientX;
                    startY = e.clientY;
                    initialX = panel.offsetLeft;
                    initialY = panel.offsetTop;
                    header.style.cursor = 'grabbing';
                }
                else if (e.button === 2) {
                    panel.classList.toggle('collapsed');
                }
            });
        });

        document.addEventListener('mousemove', (e) => {
            if (!activePanel) return;

            const dx = e.clientX - startX;
            const dy = e.clientY - startY;

            activePanel.style.left = `${initialX + dx}px`;
            activePanel.style.top = `${initialY + dy}px`;
        });

        document.addEventListener('mouseup', () => {
            if (activePanel) {
                const header = activePanel.querySelector('.panel-header');
                header.style.cursor = 'move';
                activePanel = null;
            }
        });
    </script>
</body>
</html>
